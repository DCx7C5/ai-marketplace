version: 2

updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/mcps/create-tempemail-mcp"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "DCx7C5"
    labels:
      - "dependencies"
      - "security"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "fix(deps):"
      include: "scope"

