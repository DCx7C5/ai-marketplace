name: Validate & Index

on:
  push:
    branches: [main]
    paths:
      - 'agents/**'
      - 'skills/**'
  pull_request:
    branches: [main]
    paths:
      - 'agents/**'
      - 'skills/**'

jobs:
  validate:
    name: Validate schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run validation
        run: bash scripts/validate.sh
