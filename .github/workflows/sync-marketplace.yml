name: Sync Marketplace

on:
  push:
    branches: [main]
    paths:
      - 'agents/**'
      - 'skills/**'
      - 'rules/**'
      - 'teams/**'
      - 'workflows/**'
      - 'mcps/**'
  pull_request:
    branches: [main]
    paths:
      - 'agents/**'
      - 'skills/**'
      - 'rules/**'
      - 'teams/**'
      - 'workflows/**'
      - 'mcps/**'

jobs:
  sync:
    name: Regenerate indexes and counters
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.DYSTOPIANBOT_CLIENT_ID }}
          private-key: ${{ secrets.DYSTOPIANBOT_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Detect semantic version
        id: semver
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          WITH_V: true
          RELEASE_BRANCHES: main
          DEFAULT_BUMP: patch

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Regenerate index.json tree
        run: python3 scripts/generate_index.py

      - name: Update README counters
        run: python3 scripts/update_counters.py

      - name: Commit and push changes (if any)
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if ! git diff --quiet; then
            git add index.json agents/index.json skills/index.json rules/index.json teams/index.json workflows/index.json mcps/index.json README.md
            git commit -m "chore: sync marketplace indexes and counters"
            git push
          fi

      - name: Comment on PR with changes
        if: github.event_name == 'pull_request' && !cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changes = require('child_process').execSync('git diff --name-only HEAD~1 HEAD').toString().trim().split('\n');
            
            const indexFiles = changes.filter(f => f.includes('index.json') || f === 'README.md');
            if (indexFiles.length > 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ Marketplace indexes and counters have been updated:\n- ' + indexFiles.join('\n- ')
              });
            }
