name: "Daily GPG Key Rotation"

on:
  workflow_dispatch:
  schedule:
    # Run at 02:00 UTC daily
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

jobs:
  rotate-gpg-key:
    runs-on: ubuntu-latest
    steps:
      - name: GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DYSTOPIANBOT_APP_ID }}
          private-key: ${{ secrets.DYSTOPIANBOT_KEY }}
          repositories: actions

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app_token.outputs.token }}

      - name: Import root GPG key
        id: gpg_import
        uses: ./gpg-import
        with:
          key: ${{ secrets.GPG_PRIVATE_KEY }}
          import-method: 'inline'
          gpg-home: ${{ format('{0}/.gnupg', github.workspace) }}
          gpg-pass: ${{ secrets.GPG_PASSPHRASE }}
          configure-git: 'true'
          initialize-home: 'true'
          preset-passphrase-cache: 'true'

      - name: Derive daily signing subkey
        id: derive_key
        env:
          GNUPGHOME: ${{ steps.gpg_import.outputs.gpg_home }}
          ROOT_FP: ${{ steps.gpg_import.outputs.fingerprint }}
          GPG_PASS: ${{ secrets.GPG_PASSPHRASE }}
          TODAY: ${{ github.event.repository.updated_at }}
        run: |
          set -euo pipefail
          
          # Generate daily subkey expiring in 24h
          EXPIRE_DATE=$(date -d "+1 day" +%Y-%m-%d)
          KEY_NAME="Daily Rotation $(date +%Y-%m-%d)"
          
          # Create batch file for addkey
          cat > /tmp/addkey.batch << EOF
          %no-protection
          %ask-passphrase
          Key-Type: RSA
          Key-Length: 4096
          Subkey-Type: RSA
          Subkey-Length: 4096
          Name-Real: $KEY_NAME
          Name-Email: rotation@example.com
          Expire-Date: $EXPIRE_DATE
          Handle-Errors: ignore
          %commit
          EOF
          
          # Add subkey to root key
          echo "$GPG_PASS" | gpg --batch --pinentry-mode loopback --command-fd 0 \
            --edit-key "$ROOT_FP" < /tmp/addkey.batch || true
          
          # Export new signing subkey fingerprint
          NEW_KEY_FP=$(gpg --batch --with-colons --list-sigs "$ROOT_FP" | \
            awk -F: '/^sub/ {print $5; exit}' | head -c 16)
          
          # Export public key for storage
          gpg --batch --armor --export "$NEW_KEY_FP" > /tmp/signing-key-${TODAY}.asc
          
          echo "new_key_fp=$NEW_KEY_FP" >> "$GITHUB_OUTPUT"
          echo "expire_date=$EXPIRE_DATE" >> "$GITHUB_OUTPUT"
          echo "key_exported=true" >> "$GITHUB_OUTPUT"

      - name: Test signing with derived key
        id: test_sign
        env:
          GNUPGHOME: ${{ steps.gpg_import.outputs.gpg_home }}
          NEW_KEY_FP: ${{ steps.derive_key.outputs.new_key_fp }}
          GPG_PASS: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          
          # Create test message
          TEST_MSG="GPG Key Rotation Test - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "$TEST_MSG" > /tmp/test-message.txt
          
          # Sign with new key
          if echo "$GPG_PASS" | gpg --batch --pinentry-mode loopback \
              --passphrase-fd 0 \
              --local-user "$NEW_KEY_FP" \
              --armor --detach-sign \
              --output /tmp/test-message.asc \
              /tmp/test-message.txt; then
            echo "sign_ok=true" >> "$GITHUB_OUTPUT"
            echo "test_message=$TEST_MSG" >> "$GITHUB_OUTPUT"
          else
            echo "sign_ok=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Verify signature
        id: verify_sig
        env:
          GNUPGHOME: ${{ steps.gpg_import.outputs.gpg_home }}
        run: |
          set -euo pipefail
          
          if gpg --batch --verify /tmp/test-message.asc /tmp/test-message.txt 2>/dev/null; then
            echo "verify_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "verify_ok=false" >> "$GITHUB_OUTPUT"
            gpg --batch --verify /tmp/test-message.asc /tmp/test-message.txt || true
          fi

      - name: Store rotation record
        if: steps.test_sign.outputs.sign_ok == 'true' && steps.verify_sig.outputs.verify_ok == 'true'
        id: store_record
        env:
          NEW_KEY_FP: ${{ steps.derive_key.outputs.new_key_fp }}
          EXPIRE_DATE: ${{ steps.derive_key.outputs.expire_date }}
          ROOT_FP: ${{ steps.gpg_import.outputs.fingerprint }}
        run: |
          set -euo pipefail
          
          # Create rotation record
          RECORD="rotation-$(date +%Y%m%d).json"
          cat > "$RECORD" << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "root_fingerprint": "$ROOT_FP",
            "daily_key_fingerprint": "$NEW_KEY_FP",
            "expires": "$EXPIRE_DATE",
            "status": "active"
          }
          EOF
          
          mkdir -p .github/gpg-rotation-records
          mv "$RECORD" ".github/gpg-rotation-records/"
          
          echo "record_file=.github/gpg-rotation-records/$RECORD" >> "$GITHUB_OUTPUT"

      - name: Commit rotation record
        if: steps.store_record.outputs.record_file
        uses: actions/upload-artifact@v7
        with:
          name: gpg-rotation-record
          path: .github/gpg-rotation-records/
          retention-days: 90

      - name: Commit and push
        if: steps.test_sign.outputs.sign_ok == 'true' && steps.verify_sig.outputs.verify_ok == 'true'
        id: commit_push
        env:
          GIT_AUTHOR_NAME: "Copilot"
          GIT_AUTHOR_EMAIL: "223556219+Copilot@users.noreply.github.com"
          GIT_COMMITTER_NAME: "Copilot"
          GIT_COMMITTER_EMAIL: "223556219+Copilot@users.noreply.github.com"
        run: |
          set -euo pipefail
          
          if [[ -n "$(git status --porcelain .github/gpg-rotation-records/)" ]]; then
            git add .github/gpg-rotation-records/
            git commit -m "chore: rotate GPG signing key - $(date +%Y-%m-%d)"
            git push
            echo "commit_pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "commit_pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Telegram (Success)
        if: steps.commit_push.outputs.commit_pushed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NEW_KEY_FP: ${{ steps.derive_key.outputs.new_key_fp }}
          EXPIRE_DATE: ${{ steps.derive_key.outputs.expire_date }}
          ROOT_FP: ${{ steps.gpg_import.outputs.fingerprint }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          WORKFLOW_RUN: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          
          MSG="🔄 *GPG Key Rotation — Success*%0A%0A"
          MSG="${MSG}📅 Date: $(date -u +%Y-%m-%d\ %H:%M:%SZ)%0A"
          MSG="${MSG}🔑 Root: \`${ROOT_FP:0:16}...\`%0A"
          MSG="${MSG}🆕 Daily: \`${NEW_KEY_FP:0:16}...\`%0A"
          MSG="${MSG}⏰ Expires: ${EXPIRE_DATE}%0A%0A"
          MSG="${MSG}✅ Signature & Verification: OK%0A"
          MSG="${MSG}📦 Record: Committed%0A%0A"
          MSG="${MSG}[View Workflow](${WORKFLOW_RUN})"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHANNEL_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true" | jq '.ok' > /dev/null
          
          echo "✅ Telegram notification sent"

      - name: Notify Telegram (Failure)
        if: failure() && steps.test_sign.outputs.sign_ok != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          WORKFLOW_RUN: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          
          MSG="❌ *GPG Key Rotation — Failed*%0A%0A"
          MSG="${MSG}📅 Date: $(date -u +%Y-%m-%d\ %H:%M:%SZ)%0A"
          MSG="${MSG}⚠️  Signing or verification failed%0A%0A"
          MSG="${MSG}[Check Workflow](${WORKFLOW_RUN})"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHANNEL_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true" | jq '.ok' > /dev/null
          
          echo "📢 Failure notification sent to Telegram"

      - name: Job Summary
        if: always()
        env:
          IMPORT_OUTCOME: ${{ steps.gpg_import.outcome }}
          DERIVE_OUTCOME: ${{ steps.derive_key.outcome }}
          SIGN_OUTCOME: ${{ steps.test_sign.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify_sig.outcome }}
          SIGN_OK: ${{ steps.test_sign.outputs.sign_ok }}
          VERIFY_OK: ${{ steps.verify_sig.outputs.verify_ok }}
          NEW_KEY_FP: ${{ steps.derive_key.outputs.new_key_fp }}
          EXPIRE_DATE: ${{ steps.derive_key.outputs.expire_date }}
          ROOT_FP: ${{ steps.gpg_import.outputs.fingerprint }}
        run: |
          s() { [[ "$1" == "success" ]] && printf '✅' || printf '❌'; }
          c() { [[ "$1" == "true" ]] && printf '✅' || printf '❌'; }

          {
            echo "### 🔄 Daily GPG Key Rotation"
            echo ""
            echo "| Phase | Status |"
            echo "|:------|:------:|"
            echo "| Import Root | $(s "$IMPORT_OUTCOME") |"
            echo "| Derive Daily Key | $(s "$DERIVE_OUTCOME") |"
            echo "| Sign Test | $(c "$SIGN_OK") |"
            echo "| Verify Test | $(c "$VERIFY_OK") |"
            echo ""
            echo "| Property | Value |"
            echo "|:---------|:------|"
            echo "| Root Fingerprint | \`${ROOT_FP:-n/a}\` |"
            echo "| Daily Key FP | \`${NEW_KEY_FP:-n/a}\` |"
            echo "| Expires | \`${EXPIRE_DATE:-n/a}\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
