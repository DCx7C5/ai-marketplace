name: Validate Path Changes

on:
  push:
    branches: [main, develop]
    paths:
      - 'agents/**'
      - 'mcps/**'
      - 'rules/**'
      - 'skills/**'
      - 'workflows/**'
      - 'boot/**'
      - 'dracut/**'
      - 'grub/**'
      - 'hooks/**'
      - 'initramfs/**'
      - 'efi/**'
      - 'udev/**'
      - 'systemd/**'
      - '**/grubenv'
      - '**/grub.cfg'
      - '**/bootorder'
      - '**/*.conf'
  pull_request:
    branches: [main, develop]
    paths:
      - 'agents/**'
      - 'mcps/**'
      - 'rules/**'
      - 'skills/**'
      - 'workflows/**'
      - 'boot/**'
      - 'dracut/**'
      - 'grub/**'
      - 'hooks/**'
      - 'initramfs/**'
      - 'efi/**'
      - 'udev/**'
      - 'systemd/**'
      - '**/grubenv'
      - '**/grub.cfg'
      - '**/bootorder'
      - '**/*.conf'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.changes.outputs.agents }}
      mcps: ${{ steps.changes.outputs.mcps }}
      rules: ${{ steps.changes.outputs.rules }}
      skills: ${{ steps.changes.outputs.skills }}
      workflows: ${{ steps.changes.outputs.workflows }}
      boot: ${{ steps.changes.outputs.boot }}
      security: ${{ steps.changes.outputs.security }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - id: changes
        run: |
          if ! git diff --quiet HEAD~1 HEAD -- agents/ 2>/dev/null || [[ "${{ github.event_name }}" == "pull_request" && -n "$(git diff --name-only HEAD origin/${{ github.base_ref }} | grep '^agents/')" ]]; then
            echo "agents=true" >> $GITHUB_OUTPUT
          else
            echo "agents=false" >> $GITHUB_OUTPUT
          fi
          
          if ! git diff --quiet HEAD~1 HEAD -- mcps/ 2>/dev/null || [[ "${{ github.event_name }}" == "pull_request" && -n "$(git diff --name-only HEAD origin/${{ github.base_ref }} | grep '^mcps/')" ]]; then
            echo "mcps=true" >> $GITHUB_OUTPUT
          else
            echo "mcps=false" >> $GITHUB_OUTPUT
          fi
          
          if ! git diff --quiet HEAD~1 HEAD -- rules/ 2>/dev/null || [[ "${{ github.event_name }}" == "pull_request" && -n "$(git diff --name-only HEAD origin/${{ github.base_ref }} | grep '^rules/')" ]]; then
            echo "rules=true" >> $GITHUB_OUTPUT
          else
            echo "rules=false" >> $GITHUB_OUTPUT
          fi
          
          if ! git diff --quiet HEAD~1 HEAD -- skills/ 2>/dev/null || [[ "${{ github.event_name }}" == "pull_request" && -n "$(git diff --name-only HEAD origin/${{ github.base_ref }} | grep '^skills/')" ]]; then
            echo "skills=true" >> $GITHUB_OUTPUT
          else
            echo "skills=false" >> $GITHUB_OUTPUT
          fi
          
          if ! git diff --quiet HEAD~1 HEAD -- workflows/ 2>/dev/null || [[ "${{ github.event_name }}" == "pull_request" && -n "$(git diff --name-only HEAD origin/${{ github.base_ref }} | grep '^workflows/')" ]]; then
            echo "workflows=true" >> $GITHUB_OUTPUT
          else
            echo "workflows=false" >> $GITHUB_OUTPUT
          fi
          
          # Detect boot-related changes
          BOOT_CHANGES=$(( $(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '(boot/|dracut/|grub/|hooks/|initramfs/|efi/|udev/|systemd/|grubenv|grub\.cfg|bootorder|\.conf)' | wc -l) + $(git diff --name-only HEAD origin/${{ github.base_ref }} 2>/dev/null | grep -E '(boot/|dracut/|grub/|hooks/|initramfs/|efi/|udev/|systemd/|grubenv|grub\.cfg|bootorder|\.conf)' | wc -l) ))
          if [[ $BOOT_CHANGES -gt 0 ]]; then
            echo "boot=true" >> $GITHUB_OUTPUT
            echo "security=true" >> $GITHUB_OUTPUT
          else
            echo "boot=false" >> $GITHUB_OUTPUT
            echo "security=false" >> $GITHUB_OUTPUT
          fi

  validate-agents:
    needs: detect-changes
    if: needs.detect-changes.outputs.agents == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate agents
        run: |
          echo "🔍 Validating agents/**"
          bash scripts/validate.sh agents 2>&1 | head -50 || true

  validate-mcps:
    needs: detect-changes
    if: needs.detect-changes.outputs.mcps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate MCPs
        run: |
          echo "🔍 Validating mcps/**"
          bash scripts/validate.sh mcps 2>&1 | head -50 || true

  validate-rules:
    needs: detect-changes
    if: needs.detect-changes.outputs.rules == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate rules
        run: |
          echo "🔍 Validating rules/**"
          bash scripts/validate.sh rules 2>&1 | head -50 || true

  validate-skills:
    needs: detect-changes
    if: needs.detect-changes.outputs.skills == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skills
        run: |
          echo "🔍 Validating skills/**"
          bash scripts/validate.sh skills 2>&1 | head -50 || true

  validate-workflows:
    needs: detect-changes
    if: needs.detect-changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflows
        run: |
          echo "🔍 Validating workflows/**"
          bash scripts/validate.sh workflows 2>&1 | head -50 || true

  validate-boot-security:
    needs: detect-changes
    if: needs.detect-changes.outputs.security == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🔐 SECURITY ALERT - Boot Configuration Changes Detected
        run: |
          echo "⚠️  CRITICAL: Boot/Security-related files were modified!"
          echo ""
          echo "Changed files:"
          git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '(boot/|dracut/|grub/|hooks/|initramfs/|efi/|udev/|systemd/|grubenv|grub\.cfg|bootorder|\.conf)' || git diff --name-only HEAD origin/${{ github.base_ref }} 2>/dev/null | grep -E '(boot/|dracut/|grub/|hooks/|initramfs/|efi/|udev/|systemd/|grubenv|grub\.cfg|bootorder|\.conf)' || true
          echo ""
          
      - name: Validate boot configurations
        run: |
          echo "📋 Checking for suspicious patterns..."
          
          # Check for unauthorized GRUB modifications
          if git diff HEAD~1 HEAD 2>/dev/null | grep -E '\+.*GRUB_CMDLINE_LINUX.*root='; then
            echo "⚠️  Root parameter changed - review required"
          fi
          
          # Check for bootorder changes
          if git diff HEAD~1 HEAD 2>/dev/null | grep -E '\+.*bootorder'; then
            echo "⚠️  Boot order modified - verify authenticity"
          fi
          
          # Check for hook modifications
          if git diff HEAD~1 HEAD 2>/dev/null | grep -E '\.hook|/hooks/' | grep -E '^\+'; then
            echo "⚠️  ALPM hooks modified - verify for tampering"
          fi
          
          # Check for dracut changes
          if git diff HEAD~1 HEAD 2>/dev/null | grep -E 'dracut|initramfs' | grep -E '^\+'; then
            echo "⚠️  Initramfs configuration changed - kernel modification detected"
          fi
          
          # Check EFI/Secure Boot changes
          if git diff HEAD~1 HEAD 2>/dev/null | grep -E 'efi|secboot|mokutil' | grep -E '^\+'; then
            echo "⚠️  EFI/Secure Boot configuration changed"
          fi
          
          echo "✓ Boot security scan complete"
      
      - name: Post security comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔐 **Security Check Required**\n\nThis PR modifies boot, GRUB, dracut, or system configuration files.\n\n**Manual review required for:**\n- Bootloader changes\n- Kernel parameters (GRUB_CMDLINE_LINUX)\n- Boot order modifications\n- ALPM hooks\n- EFI/Secure Boot settings\n\nPlease verify all changes are intentional and signed.'
            })

  summary:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report changes
        run: |
          echo "## Path Change Detection"
          echo "- agents: ${{ needs.detect-changes.outputs.agents }}"
          echo "- mcps: ${{ needs.detect-changes.outputs.mcps }}"
          echo "- rules: ${{ needs.detect-changes.outputs.rules }}"
          echo "- skills: ${{ needs.detect-changes.outputs.skills }}"
          echo "- workflows: ${{ needs.detect-changes.outputs.workflows }}"
          echo "- 🔐 **boot/security**: ${{ needs.detect-changes.outputs.security }}"
